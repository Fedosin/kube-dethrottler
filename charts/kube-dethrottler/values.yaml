# Default values for kube-dethrottler.

replicaCount: 2

image:
  repository: fedosin/kube-dethrottler
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "kube-dethrottler"

podSecurityContext: {}

securityContext: {}
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Node selector for the Deployment pods (where kube-dethrottler itself runs)
nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

# Configuration for kube-dethrottler application
config:
  # How often to poll PSI metrics from nodes
  pollInterval: "30s"
  # How long to wait after load returns to normal before removing the taint
  cooldownPeriod: "5m"
  # Taint key to apply when thresholds are exceeded
  taintKey: "kube-dethrottler/high-load"
  # Taint effect (NoSchedule, PreferNoSchedule, NoExecute)
  taintEffect: "NoSchedule"
  # Label selector to filter which nodes to monitor (empty = all nodes)
  nodeFilter: ""

  # Leader election configuration for HA deployments
  leaderElection:
    enabled: true
    leaseName: "kube-dethrottler-leader"
    leaseNamespace: "kube-system"

  # PSI pressure thresholds (percentage, 0-100). A value of 0 disables that check.
  thresholds:
    cpu:
      some:
        avg10: 25.0
        avg60: 0
        avg300: 0
      full:
        avg10: 10.0
        avg60: 0
        avg300: 0
    memory:
      some:
        avg10: 20.0
        avg60: 0
        avg300: 0
      full:
        avg10: 5.0
        avg60: 0
        avg300: 0
    io:
      some:
        avg10: 30.0
        avg60: 0
        avg300: 0
      full:
        avg10: 15.0
        avg60: 0
        avg300: 0

  # Optional path to kubeconfig file (for local development, not in-cluster)
  # kubeconfigPath: ""

# Resources for the kube-dethrottler container
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 50m
  #   memory: 64Mi

# RBAC configuration
rbac:
  create: true
